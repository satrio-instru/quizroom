# Render.com Blueprint
# Backend: Web Service (Docker)
# Frontend: Static Site

services:
  # ─── Backend ───
  - type: web
    name: quizroom-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
        # Set di Render Dashboard setelah frontend deploy:
        # https://quizroom.onrender.com

  # ─── Frontend ───
  - type: static_site
    name: quizroom
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_SOCKET_URL
        sync: false
        # Set di Render Dashboard:
        # https://quizroom-api.onrender.com
