# Render Blueprint
# Deploy only the backend here. Deploy the frontend separately on Vercel.

services:
  - type: web
    name: quizroom-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
        # Set this in Render after Vercel deploys the frontend:
        # https://your-vercel-project.vercel.app
